  Pour réduire son empreinte eau, il est nécessaire de <2>changer nos habitudes quotidiennes</2>.: To reduce our water footprint, we need to <2>change our daily habits</2>.
  '<0>Eau verte</0> : eau de pluie absorbée par les sols, utilisée pour les cultures sans irrigation artificielle ;': '<0>Green water</0>: rainwater absorbed by the soil and used to grow crops without artificial irrigation;'
  "<0>Eau bleue</0> : eau de surface et souterraine prélevée pour l’irrigation, la production industrielle ou l'énergie ;": '<0>Blue water</0>: surface and groundwater withdrawn for irrigation, industrial production or energy;'
  Une fois utilisée, cette eau est <2>dépolluée</2> puis <5>renvoyée</5> dans les cours d'eau locaux.: Once it has been used, the water is <2>cleaned</2> and <5>returned to</5> local watercourses.
  2 millions de personnes ont déjà calculé leur empreinte sur le climat avec le calculateur Nos Gestes Climat ! Et vous, qu'attendez-vous pour faire le test ?: 2 million people have already calculated their climate footprint using the Nos Gestes Climat calculator! What about you? What are you waiting for?
  '<0>Eau grise</0> : quantité d’eau nécessaire pour diluer les polluants générés par la production d’un bien ou service.': '<0>Grey water</0>: quantity of water needed to dilute the pollutants generated by the production of a good or service.'
  'L’empreinte eau d’un français est de plusieurs milliers de litres par jour : <2>entre 4 et 8000</2>, en moyenne.': 'The water footprint of a French person is several thousand litres a day: <2>between 4 and 8,000</2> on average.'
  À la différence de l’empreinte carbone, nous ne disposons pas encore de données consolidées à l’échelle de la France, ni d’objectifs à atteindre. Mais nous avons déjà une vision assez juste des conséquences de notre accaparement de cette précieuse ressource <2>pour l’ensemble du vivant</2>. Nous pouvons agir collectivement pour réduire notre empreinte eau.: Unlike the carbon footprint, we do not yet have consolidated data for France, or targets to aim for. But we already have a fairly accurate picture of the consequences of our monopolisation of this precious resource <2>for all living things</2>. We can act collectively to reduce our water footprint.
  Une hausse de 1 degré de la température du globe entraîne <2>une hausse de 7% du taux d’humidité</2> dans l’atmosphère. L’eau s’évapore plus, plus vite, et les phénomènes climatiques violents s’intensifient. <6>Des régions s’assèchent, quand d’autres sont inondées.</6>: A rise of 1 degree in global temperature leads to <2>a 7% increase in</2> atmospheric <2>humidity</2>. Water evaporates more, faster, and violent climatic phenomena intensify. <6>Some regions dry up, while others are flooded.</6>
  Par ailleurs, <2>l’empreinte humaine sur les sols</2> (artificialisation, cultures intensives, déforestation) a réduit fortement leur capacité à absorber et retenir les eaux pluviales. Elle s’évapore trop vite, et n’alimente plus autant les cours d’eau, lacs et nappes phréatiques, qui progressivement s’épuisent.: In addition, <2>the human footprint on soils</2> (artificialization, intensive farming, deforestation) has greatly reduced their capacity to absorb and retain rainwater. It evaporates too quickly, and no longer feeds rivers, lakes and groundwater to the same extent, which is gradually running out.
  Adopter <2>une alimentation moins gourmande en eau</2>, en consommant moins de viande et en privilégiant <5>les produits locaux et de saison</5>, a également un impact significatif. Enfin, en évitant <8>le gaspillage</8> et en achetant des produits fabriqués de manière durable, on peut contribuer à la préservation des ressources hydriques tout en limitant <11>notre empreinte environnementale</11>.: Adopting <2>a less water-intensive diet</2>, by eating less meat and favouring <5>local and seasonal produce</5>, also has a significant impact. Finally, by avoiding <8>waste</8> and buying sustainably produced products, we can help preserve water resources while limiting <11>our environmental footprint</11>.
  Ainsi, en calculant votre empreinte carbone, vous obtenez également <2>une estimation de votre empreinte eau</2> pour une vision complète de votre impact.: So by calculating your carbon footprint, you also get <2>an estimate of your water footprint</2> for a complete picture of your impact.
  Informez-vous sur l’empreinte carbone, de sa définition aux actions les plus impactantes pour réduire ses émissions et enclencher sa transition écologique: Find out more about the carbon footprint, from its definition to the most impactful actions to reduce emissions and kick-start your ecological transition
  Ce n’est pas parce qu’elle n’est pas incluse qu’elle n’est pas importante ! Régulièrement, de nombreux territoires français sont soumis à <2>des restrictions d’eau liées à des périodes de sécheresse</2>. Il est important de réduire sa consommation d'eau domestique pour mieux partager cette <5>ressource vitale</5> et limiter les pressions sur les réserves locales.: Just because it's not included doesn't mean it's not important! Many areas of France are regularly subject to <2>water restrictions due to periods of drought</2>. It's important to reduce domestic water consumption to share this <5>vital resource</5> more effectively and limit the pressure on local reserves.
  Découvrez les litres d’eau cachés derrière chacun de vos repas, vêtements, appareils… Adoptez des actions concrètes pour réduire votre empreinte eau: Discover the litres of water hidden behind each of your meals, clothes, appliances, etc. Take concrete action to reduce your water footprint
  Au travers <2>du calculateur Nos Gestes Climat</2>, nous calculons <5>la quantité d’eau consommée par chacun de vos usages</5> (achat d’un produit ou aliment, utilisation d’un service, consommations d’énergies).: Using <2>the Nos Gestes Climat calculator</2>, we calculate <5>the amount of water consumed by each of your uses</5> (purchase of a product or food, use of a service, energy consumption).
  <0>L’eau domestique</0>, celle qui sort de vos robinets pour la douche, la cuisine, le ménage... n'est pas incluse dans l'empreinte eau car elle est en grande majorité <3>restituée dans le même bassin versant</3> après traitement.: <0>Domestic water</0>, the water that comes out of your taps for showering, cooking, cleaning... is not included in the water footprint because most of it is <3>returned to the same catchment area</3> after treatment.
  La méthodologie AWARE que nous utilisons pour calculer l’empreinte eau se concentre sur les prélèvements d’eau, à savoir <2>l’eau bleue</2>. Elle ne tient pas compte de l’eau grise.: The AWARE methodology we use to calculate the water footprint focuses on water withdrawals, i.e. <2>blue water</2>. It does not take grey water into account.
  Il existe plusieurs méthodes pour calculer une empreinte eau. Chacune présente des avantages, et aucune à ce stade ne permet de saisir toute la complexité de la question des impacts de l’humain sur le cycle de l’eau. Notre choix s’est porté sur la méthode AWARE , qui permet de valoriser à sa juste mesure le stress hydrique des régions concernées par les consommations d’eau. C’est la méthode recommandée par la convention européenne, et plébiscitée par l’ADEME pour ses calculs d’ACV.: There are several methods for calculating a water footprint. Each has its advantages, but none at this stage captures the full complexity of the issue of human impacts on the water cycle. We have chosen the AWARE method, which gives a fair assessment of the water stress in the regions affected by water consumption. It is the method recommended by the European Convention, and is widely used by ADEME for its LCA calculations.
