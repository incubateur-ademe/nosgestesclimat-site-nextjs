  ': le chauffage (et dans une moindre mesure, la climatisation) est le poste le plus important de consommation énergétique du logement, donc d’émission de GES. Il faut également y ajouter les consommations des appareils électroménagers ;': heating (and, to a lesser extent, air conditioning) is the largest single source of energy consumption in the home, and therefore of greenhouse gas emissions. To this must also be added the consumption of household appliances;
  ': la combustion d’énergies fossiles (charbon, pétrole, gaz naturel) pour produire de l’électricité mais aussi pour alimenter les industries est la première cause d’émissions de CO₂ dans le monde ;': combustion of fossil fuels (coal, oil, natural gas) to produce electricity and power industry is the leading cause of CO₂ emissions worldwide;
  ': la fabrication de biens (électronique, vêtements, équipements, loisirs) à travers le monde génère des émissions à chaque étape : extraction des matières premières, production, transport, distribution et élimination. Ces processus contribuent fortement à l’empreinte carbone globale en raison d’une demande toujours croissante.': 'the manufacture of goods (electronics, clothing, equipment, leisure) around the world generates emissions at every stage: extraction of raw materials, production, transport, distribution and disposal. These processes make a significant contribution to the global carbon footprint because of ever-increasing demand.'
  ': les pratiques agricoles intensives et l’élevage, en particulier la production de viande et les rejets de méthane des ruminants, contribuent fortement aux gaz à effet de serre, avec un impact significatif sur le changement climatique. L’usage de fertilisants et la fertilisants et la déforestation pour l’extension des terres agricoles contribuent également à ces émissions ;': intensive agricultural practices and livestock farming, particularly meat production and methane emissions from ruminants, are major contributors to greenhouse gases, with a significant impact on climate change. The use of fertilisers and deforestation to extend farmland also contribute to these emissions;
  ': voitures, camions, avions et navires rejettent massivement du CO2 en brûlant des carburants fossiles. La demande carburants fossiles. La demande croissante de mobilité (voyages et transport de marchandises) accentue ces émissions ;': 'cO2 emissions: cars, trucks, planes and ships emit massive amounts of CO2 by burning fossil fuels. Demand for fossil fuels. The growing demand for mobility (travel and goods transport) is exacerbating these emissions;'
