  international.pourquoi.2: As electricity becomes more important due to the energy transition, the carbon footprint of the electricity mix strongly influences the climate footprint calculation.
  international.pourquoi.2.lock: Au fur et à mesure que l'électricité prend une place très importante grâce à la transition énergétique, l'empreinte carbone du mix électrique influence fortement le calcul d'empreinte climat.
  international.ensuite.1: We have launched a first version of internationalization that includes a dozen countries. We are doing it step by step, to consolidate the particularities of each country. Is yours not included? <2>Contact us!</2>
  international.ensuite.1.lock: Nous avons lancé une première version de l'internationalisation qui comprend une douzaine de pays. Nous le faisons pas à pas, pour consolider les particularités de chaque pays. Le votre n'y est pas ? <2>Écrivez-nous !</2>
  international.pourquoi.1: Lifestyles are not the same depending on the country you live in. Some countries have a highly developed rail network, others are insular and therefore rely more on ferry and air travel.
  international.pourquoi.1.lock: Les modes de vies ne sont pas les mêmes en fonction du pays dans lequel on vit. Certains pays ont un réseau ferré très développé, d'autres sont insulaires et donc reposent davantage sur le ferry et l'avion.
  international.comment.1: In order to propose a model for each country, we necessarily need a base. Nos Gestes Climat was built on the case of France. From there, each country describes its differences from the base.
  international.comment.1.lock: Pour proposer un modèle pour chaque pays, il nous faut forcément une base. Nos Gestes Climat s'est construit sur le cas de la France. À partir de là, chaque pays décrit ses différences par rapport à la base.
  international.pourquoi.3: 'Where available, we use the electricity mix footprint provided by :'
  international.pourquoi.3.lock: "Nous utilisons, quand disponible, l'empreinte du mix électrique fournie par :"
