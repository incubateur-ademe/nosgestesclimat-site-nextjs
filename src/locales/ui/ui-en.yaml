  Qu’est-ce que le carbone et pourquoi est-il important ?: What is carbon and why is it important?
  "L'empreinte carbone : une empreinte parmi d'autres !": 'The carbon footprint: one footprint among many!'
  À l’échelle nationale, la France s’est fixée pour objectif d’atteindre la neutralité carbone d’ici 2050, ce qui implique de réduire drastiquement les émissions dans tous les secteurs.: At national level, France has set itself the goal of achieving carbon neutrality by 2050, which means drastically reducing emissions in all sectors.
  "L'empreinte carbone moyenne d'un français est de <2>9 tonnes de CO2e par an</2>. Objectif 2050 : 2 tonnes !": The average French person's carbon footprint is <2>9 tonnes of CO2e per year</2>. The target for 2050 is 2 tonnes!
  Le consensus scientifique est formel, <2>cette augmentation est directement liée aux activités humaines</2>. Il est temps de réduire ou de remplacer ces activités émettrices !: "The scientific consensus is clear: <2>this increase is directly linked to human activities</2>. It's time to reduce or replace these emitting activities!"
  L’empreinte carbone n’est pas un bilan carbone. Même s’ils mesurent tous deux les émissions de gaz à effet de serre (GES), ils ne se calculent pas de la même manière et n’ont pas le même objectif.: A carbon footprint is not a carbon balance. Although they both measure greenhouse gas (GHG) emissions, they are not calculated in the same way and do not have the same objective.
  'Ces émissions bouleversent le climat, contribuant au réchauffement global et à ses conséquences dévastatrices : montée du niveau des océans, multiplication des catastrophes naturelles et extinction d’une partie du vivant.': 'These emissions are disrupting the climate, contributing to global warming and its devastating consequences: rising sea levels, an increase in the number of natural disasters and the extinction of part of the living world.'
  'Le carbone, CO2e, est le principal gaz à effet de serre, mais il y en a d’autres : méthane, protoxyde d’azote par exemple. C’est pourquoi on parle “d’équivalent carbone”.': 'Carbon, CO2e, is the main greenhouse gas, but there are others: methane and nitrous oxide, for example. That''s why we talk about "carbon equivalents".'
  L’empreinte carbone moyenne d’un Français est d’environ 9 tonnes de CO2e par an bien au-dessus de l’objectif de 2 tonnes en 2050 par personne par an recommandé par les Nations Unies pour limiter le dérèglement climatique.: The average carbon footprint of a French person is around 9 tonnes of CO2e per year, well above the target of 2 tonnes per person per year by 2050 recommended by the United Nations to limit climate change.
  Le carbone est un élément chimique nécessaire à la vie sur Terre. Il se trouve dans les végétaux, dans le sol, dans les océans et dans l’atmosphère principalement sous forme de dioxyde de carbone (CO2e).: Carbon is a chemical element necessary for life on Earth. It is found in plants, in the soil, in the oceans and in the atmosphere, mainly in the form of carbon dioxide (CO2e).
  La France représente environ 1% des émissions globales mais une partie majeure de son impact est indirecte et liée aux importations de produits fabriqués massivement à l’étranger.: France accounts for around 1% of global emissions, but a major part of its impact is indirect, linked to imports of products manufactured on a massive scale abroad.
  Quels pays émettent le plus de gaz à effet de serre ?: Which countries emit the most greenhouse gases?
  'Calculer son empreinte carbone consiste à additionner l’ensemble des gaz à effet de serre émis par ses activités quotidiennes, en tenant compte de plusieurs facteurs comme les déplacements, l’alimentation, le logement et la consommation de biens et services. ': 'Calculating our carbon footprint involves adding up all the greenhouse gases emitted by our daily activities, taking into account a number of factors such as travel, food, housing and the consumption of goods and services. '
  Ces deux indicateurs permettent de mieux comprendre l’impact environnemental de vos choix pour agir de manière plus responsable.: These two indicators give you a better understanding of the environmental impact of your choices, so that you can act more responsibly.
  En quantifiant l’ensemble de ces émissions, l’empreinte carbone permet de mesurer l’impact sur le climat et de mettre en place des stratégies pour réduire ces émissions.: By quantifying all these emissions, the carbon footprint makes it possible to measure the impact on the climate and to implement strategies to reduce these emissions.
  'Quelle est l’empreinte carbone moyenne d’un Français et celle de la France ? ': 'What is the average carbon footprint of a French person and that of France as a whole? '
  L’empreinte carbone de la France s’élève 623 millions de tonnes équivalent CO2e par an, selon <2>les données du Ministère de la Transition Écologique</2>.: France's carbon footprint amounts to 623 million tonnes of CO2e per year, according to <2>figures from the French Ministry for Ecological Transition</2>.
  L’empreinte carbone englobe les émissions directes et indirectes d’un individu sur une année. Le bilan carbone, en revanche, est un outil de comptabilité utilisé par les organisations (entreprises, collectivités) pour quantifier leurs émissions sur une période donnée et établir un plan de réduction.: The carbon footprint covers an individual's direct and indirect emissions over the course of a year. The carbon footprint, on the other hand, is an accounting tool used by organisations (companies, local authorities) to quantify their emissions over a given period and draw up a reduction plan.
  L’empreinte carbone désigne la quantité totale de gaz à effet de serre (GES) émis directement et indirectement par une personne par ses activités sur une année.: The carbon footprint is the total quantity of greenhouse gases (GHGs) emitted directly and indirectly by a person's activities over the course of a year.
  La Chine et les États-Unis sont les deux plus grands émetteurs de gaz à effet de serre en raison de leur forte dépendance aux énergies fossiles (charbon, pétrole, gaz), de leurs industries énergivores ainsi que de la croissance rapide de leurs secteurs de transport et de production manufacturière.: China and the United States are the two biggest emitters of greenhouse gases, due to their heavy reliance on fossil fuels (coal, oil and gas), their energy-intensive industries and the rapid growth of their transport and manufacturing sectors.
  La méthodologie du bilan carbone a été développée par l’ADEME (Agence de la transition écologique).: The carbon footprint methodology was developed by ADEME (French Environment and Energy Management Agency).
  Le simulateur en ligne Nos Gestes Climat permet d’estimer votre empreinte écologique, la fois votre empreinte carbone et <2>votre empreinte eau</2> en moins de 10 minutes.: The Nos Gestes Climat online simulator allows you to estimate your ecological footprint, both your carbon footprint and <2>your water footprint</2>, in less than 10 minutes.
