  Chez Nos Gestes Climat, nous croyons au pouvoir de <2>l’action collective</2> pour relever les défis environnementaux. Notre mission est de <6>sensibiliser</6> et d’accompagner chacun, citoyens, entreprises et collectivités, à mieux comprendre son empreinte écologique, carbone ou eau, <9>identifier les gestes</9> pour la réduire et <13>entraîner leur entourage</13> dans ce mouvement.: At Nos Gestes Climat, we believe in the power of <2>collective action</2> to meet environmental challenges. Our mission is to <6>raise awareness</6> and help everyone - citizens, businesses and local authorities - to better understand their ecological, carbon and water footprints, to <9>identify the steps</9> they can take to reduce them and to <13>involve those around them</13> in this movement.
