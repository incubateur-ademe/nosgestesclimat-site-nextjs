  Empreinte eau et <2>empreinte carbone</2> sont complémentaires, et les comprendre permet d'agir en faveur d'une gestion <6>plus durable des ressources naturelles</6> de la planète.: Water footprint and <2>carbon footprint</2> are complementary, and understanding them enables us to act in favour of <6>more sustainable</6> management of the planet's <6>natural resources</6>.
  Le calculateur carbone permet de comprendre quels sont nos usages qui contribuent le plus au changement climatique et de saisir <2>les actions qui auraient le plus d'impact</2> pour le réduire.: The carbon calculator enables us to understand which of our uses contribute most to climate change and to identify <2>the actions that would have the greatest impact</2> in reducing it.
