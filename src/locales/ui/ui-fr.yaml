  À la différence de l’empreinte carbone, nous ne disposons pas encore de données consolidées à l’échelle de la France, ni d’objectifs à atteindre. Mais nous avons déjà une vision assez juste des conséquences de notre accaparement de cette précieuse ressource <2>pour l’ensemble du vivant</2>. Nous pouvons agir collectivement pour réduire notre empreinte eau.: À la différence de l’empreinte carbone, nous ne disposons pas encore de données consolidées à l’échelle de la France, ni d’objectifs à atteindre. Mais nous avons déjà une vision assez juste des conséquences de notre accaparement de cette précieuse ressource <2>pour l’ensemble du vivant</2>. Nous pouvons agir collectivement pour réduire notre empreinte eau.
  Adopter <2>une alimentation moins gourmande en eau</2>, en consommant moins de viande et en privilégiant <5>les produits locaux et de saison</5>, a également un impact significatif. Enfin, en évitant <8>le gaspillage</8> et en achetant des produits fabriqués de manière durable, on peut contribuer à la préservation des ressources hydriques tout en limitant <11>notre empreinte environnementale</11>.: Adopter <2>une alimentation moins gourmande en eau</2>, en consommant moins de viande et en privilégiant <5>les produits locaux et de saison</5>, a également un impact significatif. Enfin, en évitant <8>le gaspillage</8> et en achetant des produits fabriqués de manière durable, on peut contribuer à la préservation des ressources hydriques tout en limitant <11>notre empreinte environnementale</11>.
  Ainsi, en calculant votre empreinte carbone, vous obtenez également <2>une estimation de votre empreinte eau</2> pour une vision complète de votre impact.: Ainsi, en calculant votre empreinte carbone, vous obtenez également <2>une estimation de votre empreinte eau</2> pour une vision complète de votre impact.
