  Ce n’est pas parce qu’elle n’est pas incluse qu’elle n’est pas importante ! Régulièrement, de nombreux territoires français sont soumis à <2>des restrictions d’eau liées à des périodes de sécheresse</2>. Il est important de réduire sa consommation d'eau domestique pour mieux partager cette <5>ressource vitale</5> et limiter les pressions sur les réserves locales.: Ce n’est pas parce qu’elle n’est pas incluse qu’elle n’est pas importante ! Régulièrement, de nombreux territoires français sont soumis à <2>des restrictions d’eau liées à des périodes de sécheresse</2>. Il est important de réduire sa consommation d'eau domestique pour mieux partager cette <5>ressource vitale</5> et limiter les pressions sur les réserves locales.
