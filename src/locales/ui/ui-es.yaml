  Chez Nos Gestes Climat, nous croyons au pouvoir de <2>l’action collective</2> pour relever les défis environnementaux. Notre mission est de<5>sensibiliser</5> et d’accompagner chacun, citoyens, entreprises et collectivités, à mieux comprendre son empreinte écologique, carbone ou eau, <8>identifier les gestes</8> pour la réduire et <12>entraîner leur entourage</12> dans ce mouvement.: En Nos Gestes Climat creemos en el poder de la <2>acción colectiva</2> para hacer frente a los retos medioambientales. Nuestra misión es<5>sensibilizar</5> y ayudar a todos -ciudadanos, empresas y autoridades locales- a comprender mejor su huella ecológica, de carbono o de agua, a <8>identificar las medidas</8> que pueden tomar para reducirla y a <12>implicar a quienes les rodean</12> en este movimiento.
