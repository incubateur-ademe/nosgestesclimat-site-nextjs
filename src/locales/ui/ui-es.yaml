  model.modern: El modelo se basa en <2>publicodes</2>, un lenguaje diseñado por el Estado para expresar algoritmos de interés público.
  model.modern.lock: Le modèle est basé sur <2>publicodes</2>, un langage conçu par l'État pour exprimer des algorithmes d'intérêt public.
  meta.publicodes.pages.Documentation.intro: El simulador Nos Gestes Climat se basa en el modelo de cálculo del mismo nombre, compuesto por un conjunto de bloques de construcción. Esta documentación le permite acceder de forma transparente a todas las variables del cálculo.
  meta.publicodes.pages.Documentation.intro.lock: Le calculateur Nos Gestes Climat est basé sur le modèle de calcul du même nom, composé d'un ensemble de briques. Sur cette documentation, vous avez accès en toute transparence à l'ensemble des variables du calcul.
  model.modern4: El modelo de cálculo está incrustado directamente en el cliente, por lo que el cálculo tiene lugar allí, en su navegador, y no en nuestros servidores. Los datos recogidos son tan descriptivos de la vida de los usuarios, y por tanto tan sensibles en términos de privacidad, que hacer los cálculos en el servidor <2>y almacenarlos</2> supondría un riesgo demasiado alto.
  model.modern4.lock: Le modèle de calcul est directement embarqué chez le client, le calcul a lieu là dans votre navigateur, pas sur nos serveurs. Les données collectées sont si descriptives de la vie des utilisateurs, donc sensibles en termes de vie privée, que faire les calculs côté serveur <2>et les stocker</2> poserait un risque trop élevé.
  model.modern2: Totalmente configurable, desde las preguntas formuladas al usuario hasta las hipótesis del modelo de cálculo, puede ser reutilizado <2>libremente</2> por cualquier tipo de jugador.
  model.modern2.lock: Entièrement paramétrable, depuis les questions posées à l'utilisateur jusqu'aux hypothèses du modèle de calcul, il peut être réutilisé <2>librement</2> par tout type d'acteur.
  model.intro2: Totalmente de código abierto y contributivo, cualquiera puede<1>explorarlo</1> y <4>mejorarlo</4>.
  model.intro2.lock: Entièrement ouvert (open source) et contributif, chacun peut l'<1>explorer</1>, <4>l'améliorer</4>.
  publicodes.Contribution.liensVersGithub: Si tiene algún comentario o pregunta, <2>abra un ticket directamente en GitHub</2>.
  publicodes.Contribution.liensVersGithub.lock: Pour toute remarque ou question, nous vous invitons à <2>ouvrir un ticket directement sur GitHub</2>.
  publicodes.Contribution.descriptionComplète: <0>Una descripción completa de tu problema</0><1><0>Indicando el navegador que utiliza (por ejemplo, Firefox versión 93, Chrome versión 95, Safari, etc.), y la plataforma (iPhone, Android, ordenador con Windows, etc.), nos ayudará a resolver el fallo más rápidamente.</0></1>
  publicodes.Contribution.descriptionComplète.lock: <0>La description complète de votre problème</0><1><0>En indiquant le navigateur que vous utilisez (par exemple Firefox version 93, Chrome version 95, Safari, etc.), et la plateforme (iPhone, Android, ordinateur Windows, etc.), vous nous aiderez à résoudre le bug plus rapidement.</0></1>
  model.stats2: Se compone de una combinación de cientos de micromodelos "ascendentes" para el consumo de carbono de nuestra vida cotidiana, y un modelo "descendente" derivado del trabajo del SDES para estimar la huella por persona de los llamados servicios sociales (servicios públicos y servicios básicos como las telecomunicaciones). <2>Más información sobre esta hibridación</2>.
  model.stats2.lock: Il est constitué d'une combinaison de centaines de modèles micro "bottom-up" pour les consommations carbonées de notre vie quotidienne, et d'un modèle "top-down" dérivé des travaux du SDES pour estimer l'empreinte par personne des services dits sociétaux (services publics et services de base tels les télécom). <2>En savoir plus sur cette hybridation</2>.
  model.modern3: ⬇️ A continuación puede ver la influencia de 3 parámetros de cálculo en los resultados finales.
  model.modern3.lock: ⬇️ Ci-dessous, vous pouvez voir l'influence de 3 paramètres de calcul sur les résultats finaux.
  publicodes.Personas.description: 'Los hemos definido para que representen la diversidad de los casos de uso del simulador<1>: ¡cualquier parecido con una persona existente o pasada sería pura coincidencia!</1>En ningún caso podemos decir que sean representativos de la distribución de la población francesa: no se trata de ceñirse a las estadísticas de población, sino de encontrar entre nuestros diez personajes al menos uno que represente cada uso importante y diferenciador del simulador. Así pues, para cada personaje hemos variado lo siguiente<3><0>Su sexo: aunque no influye en la huella, sería sorprendente que sólo hubiera personas "femeninas"</0><1>La edad y la situación personal y profesional: al menos un estudiante, un jubilado, un adulto en casa y un trabajador</1><2>El tamaño de su hogar: desde una persona hasta una familia numerosa</2><3>Dónde viven: en zonas urbanas, rurales y suburbanas, en el norte, en el sur, en llanuras, en montañas y en una isla</3><4>Dónde viven: de pisos a casas, de edificios nuevos a antiguos</4><5>Medios de transporte: a pie, en coche, en ferry o en avión</5><6>Su dieta: al menos un vegano, un vegetariano, una persona que sólo come pescado y un amante de la carne roja</6><7>Sus hábitos de compra: de segunda mano a nuevo, del comprador compulsivo al que no compra casi nada</7><8>Su forma de ir de vacaciones: medio de transporte, alojamiento, hay para todos los gustos</8><9>Sus aficiones: cultura, deporte, bienestar..</9></3>'
  publicodes.Personas.description.lock: 'Nous les avons définis pour qu’ils représentent la diversité des cas d’usage du calculateur.<1>Toute ressemblance avec une personne existant ou ayant existé serait purement fortuite !</1>En aucune mesure, on ne peut dire qu’ils sont représentatifs de la distribution de la population française : il ne s’agit pas de coller aux statistiques de la population, mais de retrouver parmi nos dix personas au moins un qui représente chaque usage majeur et différenciant pour le calculateur. Ainsi, nous avons fait varier pour chacun d’entre eux :<3><0>Leur genre : même s’il n’influe pas sur l’empreinte, il serait étonnant de n’avoir que des personas “femmes”</0><1>Leur âge et situation personnelle / professionnelle : au moins un étudiant, un retraité, un adulte au foyer, un actif</1><2>La taille de leur foyer : de 1 personne à famille nombreuse</2><3>Leur lieu de vie : de l’urbain, du rural et du péri-urbain, dans le nord, dans le sud, les plaines, la montagne et sur une île</3><4>Leur logement : de l’appartement à la maison, du neuf à l’ancien</4><5>Leurs modes de transport : de la marche à la voiture en passant par le ferry et l’avion</5><6>Leur régime alimentaire : au moins un végétalien, un végétarien, une personne ne mangeant que du poisson, et un amateur de viande rouge</6><7>Leur tendance à l’achat : du tout occasion au tout neuf, de l’acheteur compulsif à celui ou celle qui n’achète presque rien</7><8>Leur façon de partir en vacances : mode de transport, hébergement, on trouve de tout</8><9>Leurs loisirs : de la culture, du sport, du bien-être…</9></3>'
  model.stats: El modelo incluye ahora <1></1> reglas de cálculo. Entre ellas, <3></3> reglas son preguntas que deben formularse al usuario para calcular un resultado preciso.
