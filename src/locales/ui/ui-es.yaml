  L'empreinte eau, c'est l'ensemble de l'eau consommée pour produire et distribuer les biens et services de votre quotidien.: La huella hídrica es la cantidad total de agua consumida para producir y distribuir los bienes y servicios que utilizas cada día.
  <0>En règle générale, les valeurs d'empreinte eau varient <2>entre 9000 et 15000 litres par jour</2>. Contrairement au carbone, il n'existe pas d'objectif chiffré pour l'empreinte eau.</0><1>Nous n'affichons pas la valeur par défaut en début de test. En effet, notre modèle eau étant le premier du genre en France, nous ne voulons pas qu'elle soit perçue comme la valeur moyenne nationale.</1>: <0>Por regla general, los valores de la huella hídrica <2>oscilan entre 9.000 y 15.000 litros al día</2>. A diferencia de la huella de carbono, no existe un objetivo cuantificado para la huella hídrica.</0><1>No mostramos el valor por defecto al inicio de la prueba. Como nuestro modelo del agua es el primero de este tipo en Francia, no queremos que se perciba como la media nacional.</1>
  L’eau est une ressource planétaire précieuse. Comme le climat, <2>le cycle de l’eau est fortement impacté par les activités humaines.</2> Nous avons fait le choix d’ajouter l'empreinte eau à notre modèle de calcul afin de vous apporter des éléments de compréhension de cet impact.: El agua es un recurso mundial precioso. Al igual que el clima, <2>el ciclo del agua se ve muy afectado por las actividades humanas.</2> Hemos decidido añadir la huella hídrica a nuestro modelo de cálculo para ayudarte a comprender este impacto.
  "attention : l'eau domestique (par exemple l’eau de vos douches) ne fait pas partie de l'empreinte eau": 'nota: el agua doméstica (por ejemplo, el agua de las duchas) no se incluye en la huella hídrica'
  "L'empreinte eau, c'est l'ensemble de l'eau consommée pour produire et distribuer les biens et services de votre quotidien. Par exemple il faut de l’eau pour :": 'La huella hídrica es la cantidad total de agua consumida para producir y distribuir los bienes y servicios que utilizas cada día. Por ejemplo, se necesita agua para :'
  'Les activités humaines menacent les équilibres naturels de notre planète. Comme le climat, <2>le cycle de l’eau est fortement impacté partout dans le monde</2>: accès à l’eau potable, disparition et migration d’espèces (animales et végétales), déplacement de populations.': Las actividades humanas amenazan el equilibrio natural de nuestro planeta. Al igual que el clima, <2>el ciclo del agua está teniendo un gran impacto en todo el mundo</2>, en términos de acceso al agua potable, desaparición y migración de especies (animales y vegetales) y desplazamiento de poblaciones.
  L’eau domestique, à savoir, celle qui sort de vos robinets n'est pas comprise dans votre empreinte eau, puisqu’elle est restituée. Par exemple, l’eau de votre douche, après dépollution, est rendue aux cours d’eau de votre territoire.: El agua doméstica, es decir, la que sale de los grifos, no se incluye en la huella hídrica, ya que se devuelve al medio ambiente. Por ejemplo, una vez tratada, el agua de la ducha se devuelve a los cursos de agua de la zona.
  Ce chiffre vous semble impressionnant ? <1></1>C'est pourtant bien l'eau qui sert à produire ce que vous consommez :<3></3> votre empreinte eau, c'est l'impact de votre mode de vie sur les cycles naturels de l'eau.: '¿Te parece impresionante esta cifra? <1></1><3></3> Pero en realidad es agua la que se utiliza para producir lo que consumes: tu huella hídrica es el impacto de tu estilo de vida en los ciclos naturales del agua.'
  <0>La majeure partie de l’empreinte eau concerne la pousse des végétaux,</0> que ce soit pour nous alimenter, pour nourrir le bétail, ou pour obtenir la matière première de nombre de nos vêtements.: <0>La mayor parte de nuestra huella hídrica la genera el cultivo de plantas,</0> ya sea para alimentarnos a nosotros mismos o a nuestro ganado, o para proporcionar la materia prima de muchas de nuestras prendas de vestir.
  En règle générale, les valeurs d'empreinte eau varient <2>entre 9000 et 15000 litres par jour</2>. Contrairement au carbone, il n'existe pas d'objectif chiffré pour l'empreinte eau.: Por regla general, los valores de la huella hídrica varían <2>entre 9.000 y 15.000 litros al día</2>. A diferencia del carbono, no existe un objetivo cuantificado para la huella hídrica.
  Nous n'affichons pas la valeur par défaut en début de test. En effet, notre modèle eau étant le premier du genre en France, nous ne voulons pas qu'elle soit perçue comme la valeur moyenne nationale.: No mostramos el valor por defecto al inicio de la prueba. Como nuestro modelo del agua es el primero de este tipo en Francia, no queremos que se perciba como la media nacional.
  Les activités humaines menacent les équilibres naturels de notre planète.: Las actividades humanas amenazan el equilibrio natural de nuestro planeta.
  'Comme le climat, <2>le cycle de l’eau est fortement impacté partout dans le monde</2>: accès à l’eau potable, disparition et migration d’espèces (animales et végétales), déplacement de populations.': 'Al igual que el clima, <2>el ciclo del agua tiene importantes repercusiones en todo el mundo</2>: acceso al agua potable, desaparición y migración de especies (animales y vegetales), desplazamiento de poblaciones.'
  Ce chiffre vous semble impressionnant ?: ¿Le parece impresionante esta cifra?
  C'est pourtant bien l'eau qui sert à produire ce que vous consommez :<1></1> votre empreinte eau, c'est l'impact de votre mode de vie sur les cycles naturels de l'eau.: '<1></1> Sin embargo, es agua lo que se utiliza para producir lo que consumes: tu huella hídrica es el impacto de tu estilo de vida en los ciclos naturales del agua.'
