  Au travers du calculateur Nos Gestes Climat, nous calculons la quantité d’eau consommée par chacun de vos usages (achat d’un produit ou aliment, utilisation d’un service, consommations d’énergies).: Con la calculadora Nos Gestes Climat, calculamos la cantidad de agua consumida por cada uno de tus usos (compra de un producto o alimento, utilización de un servicio, consumo de energía).
  Une fois utilisée, cette eau est dépolluée puis renvoyée dans les cours d'eau locaux.: Una vez utilizada, el agua se limpia y se devuelve a los cursos de agua locales.
  Les pratiques agricoles intensives et les rejets industriels contaminent les ressources en eau, menacent les écosystèmes et notre santé.: Las prácticas agrícolas intensivas y los residuos industriales están contaminando los recursos hídricos, amenazando los ecosistemas y nuestra salud.
  Eau bleue : eau de surface et souterraine prélevée pour l’irrigation, la production industrielle ou l'énergie.: 'Aguas azules: aguas superficiales y subterráneas extraídas para el riego, la producción industrial o la energía.'
  'Il existe plusieurs distinctions, qui permettent de valoriser les différences qualitatives d’impact de l’humain sur le cycle de l’eau. La couleur de l’eau en est une majeure :': 'Hay varias distinciones que ponen de relieve las diferencias cualitativas del impacto humano en el ciclo del agua. El color del agua es una de las principales:'
