  Économiser l’eau, un enjeu de développement durable: Ahorrar agua, una cuestión de desarrollo sostenible
  fabric: 'Favorecer los materiales sostenibles (lino, cáñamo, lana, y si es algodón: reciclado)'
  Empreinte eau et empreinte carbone sont complémentaires, et les comprendre permet d’agir en faveur d’une gestion <2>plus durable des ressources naturelles</2> de la planète.: La huella hídrica y la huella de carbono son complementarias, y comprenderlas nos permite actuar en favor de una gestión <2>más sostenible de los recursos naturales</2> del planeta.
  'Voici quelques exemples de gestes qui auront un impact important sur votre consommation eau indirecte :': 'He aquí algunos ejemplos de acciones que tendrán un impacto significativo en su consumo indirecto de agua:'
  Mieux comprendre <2>notre impact sur les ressources en eau</2> est essentiel pour pouvoir agir efficacement. À travers une série d’articles, nous vous proposons des conseils pratiques, des idées inspirantes et des informations clés pour <6>réduire votre empreinte eau</6>.: Comprender <2>nuestro impacto en los recursos hídricos</2> es esencial si queremos tomar medidas eficaces. A través de una serie de artículos, le ofrecemos consejos prácticos, ideas inspiradoras e información clave para ayudarle a <6>reducir su huella hídrica</6>.
