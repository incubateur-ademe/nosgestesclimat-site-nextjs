  'Les émissions de gaz à effet de serre proviennent de différents secteurs de l’activité humaine. Les principales sources sont :': 'Las emisiones de gases de efecto invernadero proceden de diversos sectores de la actividad humana. Las principales fuentes son :'
  À l’échelle nationale, la France s’est fixée pour objectif d’atteindre la neutralité carbone d’ici 2050, ce qui implique de réduire drastiquement les émissions dans tous les secteurs.: A escala nacional, Francia se ha fijado el objetivo de alcanzar la neutralidad en carbono de aquí a 2050, lo que significa reducir drásticamente las emisiones en todos los sectores.
  L’empreinte carbone n’est pas un bilan carbone. Même s’ils mesurent tous deux les émissions de gaz à effet de serre (GES), ils ne se calculent pas de la même manière et n’ont pas le même objectif.: Una huella de carbono no es un balance de carbono. Aunque ambos miden las emisiones de gases de efecto invernadero (GEI), no se calculan de la misma manera ni tienen el mismo objetivo.
  'Le carbone, CO2e, est le principal gaz à effet de serre, mais il y en a d’autres : méthane, protoxyde d’azote par exemple. C’est pourquoi on parle “d’équivalent carbone”.': 'El carbono, CO2e, es el principal gas de efecto invernadero, pero hay otros: metano y óxido nitroso, por ejemplo. Por eso hablamos de "equivalentes de carbono".'
  'Ces émissions bouleversent le climat, contribuant au réchauffement global et à ses conséquences dévastatrices : montée du niveau des océans, multiplication des catastrophes naturelles et extinction d’une partie du vivant.': 'Estas emisiones están alterando el clima, contribuyendo al calentamiento global y a sus devastadoras consecuencias: subida del nivel del mar, aumento del número de catástrofes naturales y extinción de parte del mundo vivo.'
  Ces deux indicateurs permettent de mieux comprendre l’impact environnemental de vos choix pour agir de manière plus responsable.: Estos dos indicadores te permiten comprender mejor el impacto medioambiental de tus elecciones, para que puedas actuar de forma más responsable.
  La méthodologie du bilan carbone a été développée par l’ADEME (Agence de la transition écologique).: La metodología de la huella de carbono fue desarrollada por la ADEME (Agencia Francesa de Medio Ambiente y Gestión de la Energía).
  L’empreinte carbone moyenne d’un Français est d’environ 9 tonnes de CO2e par an bien au-dessus de l’objectif de 2 tonnes en 2050 par personne par an recommandé par les Nations Unies pour limiter le dérèglement climatique.: La huella de carbono media de un francés es de unas 9 toneladas de CO2e al año, muy por encima del objetivo de 2 toneladas por persona y año para 2050 recomendado por Naciones Unidas para limitar el cambio climático.
