  Deux personnes accolées levant le bras en signe de succès, illustrant l'importance du collectif dans la réduction de nos empreintes carbone: Dos personas de pie, una al lado de la otra, levantando los brazos en señal de éxito, ilustrando la importancia de trabajar juntos para reducir nuestra huella de carbono
