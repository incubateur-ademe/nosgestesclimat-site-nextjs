  'Le dioxyde de carbone, CO2, est le principal gaz à effet de serre, mais il y en a d’autres : méthane, protoxyde d’azote par exemple. C’est pourquoi on parle “d’équivalent carbone”.': 'El dióxido de carbono, CO2, es el principal gas de efecto invernadero, pero hay otros: el metano y el óxido nitroso, por ejemplo. Por eso hablamos de "equivalentes de carbono".'
