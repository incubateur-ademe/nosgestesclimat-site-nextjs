  L’empreinte eau, <2>calculée en milliers de litres par jour</2>, tient compte de <5>l’eau nécessaire</5> à la production, la distribution et au traitement des biens et services consommés. Ce calcul prend également en considération <8>le stress hydrique</8> et pondère les consommations d’eau en fonction de <12>la rareté de la ressource</12> dans les territoires concernés.: La huella hídrica, <2>calculada en miles de litros al día</2>, tiene en cuenta el <5>agua necesaria</5> para producir, distribuir y procesar los bienes y servicios consumidos. Este cálculo también tiene en cuenta <8>el estrés hídrico</8> y pondera el consumo de agua en función de <12>la escasez del recurso</12> en las zonas afectadas.
  L’eau est <2>au cœur de nos vies</2> et de notre consommation quotidienne, bien <6>au-delà de ce que nous observons à la maison</6>. Chaque jour, des milliers de litres d’eau sont utilisés pour produire les aliments que nous mangeons, les vêtements que nous portons et l’énergie que nous consommons.: El agua está en <2>el centro de nuestras vidas</2> y de nuestro consumo diario, <6>mucho más allá de lo que vemos en casa</6>. Cada día se utilizan miles de litros de agua para producir los alimentos que comemos, la ropa que vestimos y la energía que consumimos.
  Empreinte eau et <2>empreinte carbone</2> sont complémentaires, et les comprendre permet d’agir en faveur d’une gestion <6>plus durable des ressources naturelles</6> de la planète.: La huella hídrica y la <2>huella de carbono</2> son complementarias, y comprenderlas nos permite actuar en favor de una gestión <6>más sostenible</6> de los <6>recursos naturales</6> del planeta.
