  2 millions de personnes ont déjà calculé leur empreinte sur le climat avec le calculateur Nos Gestes Climat ! Et vous, qu'attendez-vous pour faire le test ?: 2 millones de personas ya han calculado su huella climática con la calculadora Nos Gestes Climat ¿Y tú? ¿A qué esperas?
  Ce n’est pas parce qu’elle n’est pas incluse qu’elle n’est pas importante ! Régulièrement, de nombreux territoires français sont soumis à <2>des restrictions d’eau liées à des périodes de sécheresse</2>. Il est important de réduire sa consommation d'eau domestique pour mieux partager cette <5>ressource vitale</5> et limiter les pressions sur les réserves locales.: Que no esté incluido no significa que no sea importante Muchas zonas de Francia sufren regularmente <2>restricciones de agua debido a los periodos de sequía</2>. Es importante reducir el consumo doméstico de agua para compartir mejor este <5>recurso vital</5> y limitar la presión sobre las reservas locales.
  Une fois utilisée, cette eau est <2>dépolluée</2> puis <5>renvoyée</5> dans les cours d'eau locaux.: Una vez utilizada, el agua se <2>limpia</2> y <5>se devuelve a</5> los cursos de agua locales.
  Informez-vous sur l’empreinte carbone, de sa définition aux actions les plus impactantes pour réduire ses émissions et enclencher sa transition écologique: Más información sobre la huella de carbono, desde su definición hasta las acciones más eficaces para reducir las emisiones e iniciar la transición ecológica
  Par ailleurs, <2>l’empreinte humaine sur les sols</2> (artificialisation, cultures intensives, déforestation) a réduit fortement leur capacité à absorber et retenir les eaux pluviales. Elle s’évapore trop vite, et n’alimente plus autant les cours d’eau, lacs et nappes phréatiques, qui progressivement s’épuisent.: Además, <2>la huella humana en los suelos</2> (artificialización, agricultura intensiva, deforestación) ha reducido mucho su capacidad de absorber y retener el agua de lluvia. Se evapora con demasiada rapidez y ya no alimenta en la misma medida los ríos, los lagos y las aguas subterráneas, que se agotan poco a poco.
  Adopter <2>une alimentation moins gourmande en eau</2>, en consommant moins de viande et en privilégiant <5>les produits locaux et de saison</5>, a également un impact significatif. Enfin, en évitant <8>le gaspillage</8> et en achetant des produits fabriqués de manière durable, on peut contribuer à la préservation des ressources hydriques tout en limitant <11>notre empreinte environnementale</11>.: Adoptar <2>una dieta menos intensiva en agua</2>, comiendo menos carne y favoreciendo los <5>productos locales y de temporada</5>, también tiene un impacto significativo. Por último, si evitamos el <8>despilfarro</8> y compramos productos producidos de forma sostenible, podemos ayudar a preservar los recursos hídricos al tiempo que limitamos <11>nuestra huella ambiental</11>.
  Ainsi, en calculant votre empreinte carbone, vous obtenez également <2>une estimation de votre empreinte eau</2> pour une vision complète de votre impact.: Así, al calcular su huella de carbono, obtiene también <2>una estimación de su huella hídrica</2> para tener una visión completa de su impacto.
  Au travers <2>du calculateur Nos Gestes Climat</2>, nous calculons <5>la quantité d’eau consommée par chacun de vos usages</5> (achat d’un produit ou aliment, utilisation d’un service, consommations d’énergies).: Con <2>la calculadora Nos Gestes Climat</2>, calculamos <5>la cantidad de agua consumida por cada uno de tus usos</5> (compra de un producto o alimento, utilización de un servicio, consumo de energía).
  Découvrez les litres d’eau cachés derrière chacun de vos repas, vêtements, appareils… Adoptez des actions concrètes pour réduire votre empreinte eau: Descubre los litros de agua que se esconden detrás de cada una de tus comidas, ropa, electrodomésticos, etc. Adopta medidas concretas para reducir tu huella hídrica
  <0>L’eau domestique</0>, celle qui sort de vos robinets pour la douche, la cuisine, le ménage... n'est pas incluse dans l'empreinte eau car elle est en grande majorité <3>restituée dans le même bassin versant</3> après traitement.: El <0>agua doméstica</0>, la que sale de los grifos para ducharse, cocinar, limpiar, etc., no se incluye en la huella hídrica porque la mayor parte se <3>devuelve a la misma cuenca de captación</3> tras su tratamiento.
  Une hausse de 1 degré de la température du globe entraîne <2>une hausse de 7% du taux d’humidité</2> dans l’atmosphère. L’eau s’évapore plus, plus vite, et les phénomènes climatiques violents s’intensifient. <6>Des régions s’assèchent, quand d’autres sont inondées.</6>: Un aumento de 1 grado de la temperatura global provoca <2>un incremento del 7% de la humedad</2> atmosférica. El agua se evapora más, más rápidamente, y los fenómenos climáticos violentos se intensifican. <6>Algunas regiones se secan y otras se inundan.</6>
  La méthodologie AWARE que nous utilisons pour calculer l’empreinte eau se concentre sur les prélèvements d’eau, à savoir <2>l’eau bleue</2>. Elle ne tient pas compte de l’eau grise.: La metodología AWARE que utilizamos para calcular la huella hídrica se centra en las extracciones de agua, es decir, <2>el agua azul</2>. No tiene en cuenta las aguas grises.
  À la différence de l’empreinte carbone, nous ne disposons pas encore de données consolidées à l’échelle de la France, ni d’objectifs à atteindre. Mais nous avons déjà une vision assez juste des conséquences de notre accaparement de cette précieuse ressource <2>pour l’ensemble du vivant</2>. Nous pouvons agir collectivement pour réduire notre empreinte eau.: A diferencia de la huella de carbono, aún no disponemos de datos consolidados para Francia, ni de objetivos a los que aspirar. Pero ya tenemos una imagen bastante precisa de las consecuencias de nuestro acaparamiento de este recurso precioso <2>para todos los seres vivos</2>. Podemos actuar colectivamente para reducir nuestra huella hídrica.
  Un homme perplexe réfléchissant à l'empreinte eau du tee-shirt qu'il tient: Un hombre perplejo reflexiona sobre la huella hídrica de la camiseta que lleva en la mano
  Il existe plusieurs méthodes pour calculer une empreinte eau. Chacune présente des avantages, et aucune à ce stade ne permet de saisir toute la complexité de la question des impacts de l’humain sur le cycle de l’eau. Notre choix s’est porté sur la méthode AWARE , qui permet de valoriser à sa juste mesure le stress hydrique des régions concernées par les consommations d’eau. C’est la méthode recommandée par la convention européenne, et plébiscitée par l’ADEME pour ses calculs d’ACV.: Existen varios métodos para calcular la huella hídrica. Cada uno tiene sus ventajas, pero ninguno capta por ahora toda la complejidad de la cuestión del impacto humano en el ciclo del agua. Hemos elegido el método AWARE, que proporciona una evaluación precisa del estrés hídrico en las regiones afectadas por el consumo de agua. Es el método recomendado por la Convención Europea, y es ampliamente utilizado por ADEME para sus cálculos de ACV.
