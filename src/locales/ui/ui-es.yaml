  ': la combustion d’énergies fossiles (charbon, pétrole, gaz naturel) pour produire de l’électricité mais aussi pour alimenter les industries est la première cause d’émissions de CO₂ dans le monde ;': la combustión de combustibles fósiles (carbón, petróleo, gas natural) para producir electricidad y la industria energética es la principal causa de emisiones de CO₂ en todo el mundo;
  ': la fabrication de biens (électronique, vêtements, équipements, loisirs) à travers le monde génère des émissions à chaque étape : extraction des matières premières, production, transport, distribution et élimination. Ces processus contribuent fortement à l’empreinte carbone globale en raison d’une demande toujours croissante.': 'la fabricación de bienes (electrónica, ropa, equipamiento, ocio) en todo el mundo genera emisiones en cada una de sus fases: extracción de materias primas, producción, transporte, distribución y eliminación. Estos procesos contribuyen significativamente a la huella de carbono mundial debido a una demanda cada vez mayor.'
  ': le chauffage (et dans une moindre mesure, la climatisation) est le poste le plus important de consommation énergétique du logement, donc d’émission de GES. Il faut également y ajouter les consommations des appareils électroménagers ;': la calefacción (y, en menor medida, el aire acondicionado) es la mayor fuente de consumo de energía en el hogar y, por tanto, de emisiones de gases de efecto invernadero. A ello hay que añadir el consumo de los electrodomésticos;
  ': les pratiques agricoles intensives et l’élevage, en particulier la production de viande et les rejets de méthane des ruminants, contribuent fortement aux gaz à effet de serre, avec un impact significatif sur le changement climatique. L’usage de fertilisants et la fertilisants et la déforestation pour l’extension des terres agricoles contribuent également à ces émissions ;': las prácticas agrícolas y ganaderas intensivas, en particular la producción de carne y las emisiones de metano de los rumiantes, contribuyen en gran medida a la emisión de gases de efecto invernadero, con un impacto significativo en el cambio climático. El uso de fertilizantes y la deforestación para ampliar las tierras de cultivo también contribuyen a estas emisiones;
