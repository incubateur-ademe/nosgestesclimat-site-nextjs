  L’eau est <2>au cœur de nos vies</2> et de notre consommation quotidienne, bien <6>au-delà de ce que nous voyons à la maison</6>. Chaque jour, des milliers de litres d’eau sont utilisés pour produire les aliments que nous mangeons, les vêtements que nous portons et l’énergie que nous consommons.: El agua está en <2>el centro de nuestras vidas</2> y de nuestro consumo diario, <6>mucho más allá de lo que vemos en casa</6>. Cada día se utilizan miles de litros de agua para producir los alimentos que comemos, la ropa que vestimos y la energía que consumimos.
  Le lexique pour tout comprendre à l'empreinte eau: Un glosario para entender la huella hídrica
  La méthodologie AWARE que nous utilisons pour calculer l’empreinte eau se concentre sur les prélèvements d’eau, à savoir l’eau bleue. Elle ne tient pas compte de l’eau grise.: La metodología AWARE que utilizamos para calcular la huella hídrica se centra en las extracciones de agua, es decir, el agua azul. No tiene en cuenta las aguas grises.
  Sur le site Nos Gestes Climat, le calcul de l'empreinte eau se fait simultanément avec le calcul de l'empreinte carbone.: En la página web de Nos Gestes Climat, la huella hídrica se calcula al mismo tiempo que la huella de carbono.
  Adopter une alimentation moins gourmande en eau, en consommant moins de viande et en privilégiant les produits locaux et de saison, a également un impact significatif. Enfin, en évitant le gaspillage et en achetant des produits fabriqués de manière durable, on peut contribuer à la préservation des ressources hydriques tout en limitant notre empreinte environnementale.: Adoptar una dieta menos intensiva en agua, comiendo menos carne y favoreciendo los productos locales y de temporada, también tiene un impacto significativo. Por último, si evitamos el despilfarro y compramos productos producidos de forma sostenible, podemos ayudar a preservar los recursos hídricos al tiempo que limitamos nuestra huella ambiental.
  La production d’aliments pour les animaux d’élevage: Producción de piensos para animales de granja
  "Ce n’est pas parce qu’elle n’est pas incluse qu’elle n’est pas importante ! Régulièrement, de nombreux territoires français sont soumis à des restrictions d’eau liées à des périodes de sécheresse. Il est important de réduire sa consommation d'eau domestique pour mieux partager cette ressource vitale et limiter les pressions sur les réserves locales. ": 'Que no esté incluido no significa que no sea importante Muchas zonas de Francia sufren regularmente restricciones de agua debido a los periodos de sequía. Es importante reducir el consumo doméstico de agua para compartir mejor este recurso vital y limitar la presión sobre las reservas locales. '
  La culture des fruits, légumes et céréales que nous mangeons: Cultivar las frutas, hortalizas y cereales que comemos
  Les activités humaines perturbent le cycle de l’eau et compromettent l’accès à l’eau potable, entraînant conflits, perte de biodiversité et déplacements de populations.: Las actividades humanas alteran el ciclo del agua y comprometen el acceso al agua potable, lo que provoca conflictos, pérdida de biodiversidad y desplazamiento de poblaciones.
  <0>L’empreinte eau</0> correspond à l’ensemble de l’eau douce utilisée pour produire, distribuer et traiter en fin de vie des produits, biens ou services, que nous consommons au quotidien.: <0>La huella hídrica</0> es la cantidad total de agua dulce utilizada para producir, distribuir y tratar al final de su vida útil los productos, bienes y servicios que consumimos cada día.
  La production d’électricité: Producción de electricidad
  Il existe plusieurs méthodes pour calculer une empreinte eau. Chacune présente des avantages, et aucune à ce stade ne permet de saisir toute la complexité de la question des impacts de l’humain sur le cycle de l’eau. Notre choix s’est porté sur <2>la méthode AWARE</2>, qui permet de valoriser à sa juste mesure le stress hydrique des régions concernées par les consommations d’eau. C’est la méthode recommandée par la convention européenne, et plébiscitée par l’ADEME pour ses calculs d’ACV.: Existen varios métodos para calcular la huella hídrica. Cada uno tiene sus ventajas, pero ninguno capta por ahora toda la complejidad de la cuestión del impacto humano en el ciclo del agua. Hemos optado por <2>el método AWARE</2>, que proporciona una evaluación precisa del estrés hídrico en las regiones afectadas por el consumo de agua. Es el método recomendado por la Convención Europea y ampliamente utilizado por ADEME para sus cálculos de ACV.
