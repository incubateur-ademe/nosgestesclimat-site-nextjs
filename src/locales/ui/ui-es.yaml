  Par ailleurs, l’empreinte humaine sur les sols (artificialisation, cultures intensives, déforestation) a réduit fortement leur capacité à absorber et retenir les eaux pluviales. Elle s’évapore trop vite, et n’alimente plus autant les cours d’eau, lacs et nappes phréatiques, qui progressivement s’épuisent.: Además, la huella humana en los suelos (artificialización, agricultura intensiva, deforestación) ha reducido mucho su capacidad de absorber y retener el agua de lluvia. Se evapora con demasiada rapidez y ya no alimenta en la misma medida los ríos, los lagos y las aguas subterráneas, que se agotan poco a poco.
