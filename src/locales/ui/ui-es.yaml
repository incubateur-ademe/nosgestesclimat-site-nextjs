  C’est l’objectif à atteindre pour espérer limiter le réchauffement climatique à 2 degrés.: Este es el objetivo que debemos alcanzar si esperamos limitar el calentamiento global a 2 grados.
  Notre calculateur repose sur un modèle de données, dont l'intégralité des calculs est documentée ; les données affichées sont directement associées à votre test.: Nuestro simulador se basa en un modelo de datos, con todos los cálculos documentados; los datos mostrados están directamente asociados a su prueba.
  Il est quasiment impossible de vivre à moins de 2 tonnes dans notre société actuellement. <2>L’État, le secteur privé et les citoyens</2> devront tous contribuer pour atteindre cet objectif.: En nuestra sociedad actual es prácticamente imposible vivir con menos de 2 toneladas. Tanto el <2>Estado como el sector privado y los ciudadanos</2> tendrán que contribuir a alcanzar este objetivo.
  Les hérissons sont menacé⋅e⋅s par le changement climatique et la perte de biodiversité. L'augmentation des températures et les conditions climatiques extrêmes perturbent leur habitat naturel, rendant difficile la recherche de nourriture et la reproduction.: Los erizos están amenazados⋅e⋅s por el cambio climático y la pérdida de biodiversidad. El aumento de las temperaturas y las condiciones meteorológicas extremas están alterando su hábitat natural, lo que les dificulta encontrar alimento y reproducirse.
  Maintenant que vous avez fait votre bilan carbone et que vous avez pris conscience de votre empreinte, vous pouvez découvrir <2>l’ensemble des gestes</2> qui vous permettront d’atteindre progressivement l’objectif de 2 tonnes.: Ahora que ya has realizado tu huella de carbono y eres consciente de ella, puedes informarte sobre los <2>pasos</2> que puedes dar para alcanzar gradualmente el objetivo de las 2 toneladas.
  De plus, la disparition de leur environnement naturel, due à la déforestation et à l'urbanisation, réduit leurs zones de vie potentielles, augmentant ainsi leur vulnérabilité face aux prédateurs et aux maladies.: Además, la desaparición de su entorno natural debido a la deforestación y la urbanización está reduciendo sus posibles zonas de vida, lo que aumenta su vulnerabilidad a los depredadores y las enfermedades.
