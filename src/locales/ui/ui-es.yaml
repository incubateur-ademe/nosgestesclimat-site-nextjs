  international.comment.1: Para proponer un modelo para cada país, necesitamos necesariamente una base. Nos Gestes Climat se basa en el caso de Francia. A partir de ahí, cada país describe sus diferencias con respecto a la base.
  international.comment.1.lock: Pour proposer un modèle pour chaque pays, il nous faut forcément une base. Nos Gestes Climat s'est construit sur le cas de la France. À partir de là, chaque pays décrit ses différences par rapport à la base.
  components.localisation.LocalisationMessage.warnMessage2: No hemos podido detectar su país de simulación, por lo que se propone por defecto el modelo francés
  components.localisation.LocalisationMessage.warnMessage2.lock: Nous n'avons pas pu détecter votre pays de simulation, le modèle Français vous est proposé par défaut
  international.pourquoi.1: Los estilos de vida difieren según el país en el que se viva. Algunos países tienen una red ferroviaria muy desarrollada, mientras que otros son islas y, por tanto, dependen más de transbordadores y aviones.
  international.pourquoi.1.lock: Les modes de vies ne sont pas les mêmes en fonction du pays dans lequel on vit. Certains pays ont un réseau ferré très développé, d'autres sont insulaires et donc reposent davantage sur le ferry et l'avion.
  sites.publicodes.Tutorial.questionE: 💡 Pero, ¿qué significa esa pequeña <1>e</1>?
  sites.publicodes.Tutorial.questionE.lock: 💡 Mais que veut dire ce petit <1>e</1> ?
  publicodes.Profil.simulations: Cada simulación que ejecutas se guarda en tu navegador. Sólo tú tienes acceso a ella.
  publicodes.Profil.simulations.lock: Chaque simulation que vous faite est sauvegardée dans votre navigateur Web. Vous êtes le seul à y avoir accès.
  international.pourquoi.2: A medida que la electricidad adquiere mayor importancia como consecuencia de la transición energética, la huella de carbono del mix eléctrico tiene una gran influencia en el cálculo de la huella climática.
  international.pourquoi.2.lock: Au fur et à mesure que l'électricité prend une place très importante grâce à la transition énergétique, l'empreinte carbone du mix électrique influence fortement le calcul d'empreinte climat.
  international.ensuite.1: Hemos lanzado una primera versión de internacionalización que incluye una docena de países. Vamos paso a paso, para consolidar las características específicas de cada país. ¿No está incluido el tuyo? <2>¡Escríbanos!</2>
  international.ensuite.1.lock: Nous avons lancé une première version de l'internationalisation qui comprend une douzaine de pays. Nous le faisons pas à pas, pour consolider les particularités de chaque pays. Le votre n'y est pas ? <2>Écrivez-nous !</2>
