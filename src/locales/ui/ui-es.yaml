  'Bien sûr, certaines choses sont partagées (au sein de mon logement avec ma famille, la voiture avec les covoitureurs) : cela sera bien pris en compte dans le calcul de votre empreinte carbone, ne vous inquiétez pas !': 'Por supuesto, algunas cosas son compartidas (en mi casa con mi familia, el coche con mis compañeros de viaje): esto se tendrá en cuenta a la hora de calcular tu huella de carbono, ¡así que no te preocupes!'
  publicodes.Tutoriel.slide2.blockquote: '<2></2> <6></6> Otros gases, especialmente el metano y el óxido nitroso, también calientan el planeta: convertimos su potencial de calentamiento en CO₂e para simplificar la medición.'
  publicodes.Tutoriel.slide2.blockquote.lock: "D'autres gaz, surtout le méthane <2></2> et le protoxyde d'azote <6></6> réchauffent aussi la planète : on convertit leur potentiel de réchauffement en CO₂e pour simplifier la mesure. "
  publicodes.Tutoriel.slide2.p2: Son las máquinas que fabrican nuestras comodidades y conveniencias modernas las que emiten cantidades masivas de él, tanto que lo contamos en miles de kilos al año y por persona, ¡y por tanto en <2>toneladas de</2> CO₂e!
  publicodes.Tutoriel.slide2.p2.lock: Ce sont les machines qui font notre confort moderne qui en rejettent massivement, à tel point qu'on le compte en milliers de kilos par an et par personne, donc en <2>tonnes</2> de CO₂e !
  publicodes.Tutoriel.slide1.p1: Es un hecho que el clima se está calentando debido a la actividad humana. Todo lo que consumimos, usamos y luego tiramos requiere materiales y energía. Ya sea durante la producción, el uso o la fase de fin de vida del bien o servicio. Así que todas nuestras actividades contribuyen a las emisiones de gases de efecto invernadero. Algunas mucho, otras muy poco. Pero ¿cuál es nuestro impacto, como ciudadanos individuales?
  publicodes.Tutoriel.slide1.p1.lock: Le climat se réchauffe à cause des activités humaines, c'est un fait. Tout ce que nous consommons, utilisons, puis jetons a nécessité de la matière et de l'énergie. Que ce soit pour la phase de production, d'utilisation, ou de fin de vie du bien, ou du service. Ainsi, toutes nos activités participent à émettre des gaz à effet de serre. Certaines énormément, d'autres très peu. Mais quel est notre impact, à notre échelle de citoyen ?
  publicodes.Tutoriel.slide6: <0>Conducir un coche, comer un filete, calentar la casa, recibir tratamiento médico, comprar un televisor...</0><1>Nuestra huella de consumo individual es la suma total de todas las actividades que conforman nuestra vida moderna.</1>
  publicodes.Tutoriel.slide6.lock: <0>Prendre la voiture, manger un steak, chauffer sa maison, se faire soigner, acheter une TV...</0><1>L'empreinte de notre consommation individuelle, c'est la somme de toutes ces activités qui font notre vie moderne.</1>
  publicodes.Tutoriel.slide2.p1: 'Con una unidad de nombre bárbaro: el equivalente en CO₂. <2></2> Dióxido de carbono , ya lo conoces: lo exhalamos todo el día, pero no influye en el clima.'
  publicodes.Tutoriel.slide2.p1.lock: "Avec une unité au nom barbare : l'équivalent CO₂. Le dioxyde de carbone <2></2>, vous le connaissez : on l'expire toute la journée, mais sans influence sur le climat."
  Les personas nous servent à tester le simulateur sous toutes ses coutures, et à vérifier qu’il s’adapte bien à toutes les situations de vie des citoyens métropolitains. De par leur présence, ils nous forcent à penser à tous les cas d’usage, pour nous projeter dans différentes réalités, et inclure ces réalités dans nos refontes du parcours de test et des actions proposées à la fin de ce dernier.: Los personajes nos permiten probar el simulador desde todos los ángulos y comprobar que se adapta a todas las situaciones de la vida de los habitantes de la Francia metropolitana. Su presencia nos obliga a reflexionar sobre todos los casos de uso, a proyectarnos en realidades diferentes y a incluir estas realidades en nuestros rediseños del recorrido de prueba y de las acciones propuestas al final del mismo.
