  'Une hausse de 1 degré de la température du globe entraîne une hausse de 7% du taux d’humidité dans l’atmosphère. L’eau s’évapore plus, plus vite, et les phénomènes climatiques violents s’intensifient. Des régions s’assèchent, quand d’autres sont inondées. ': 'Un aumento de 1 grado de la temperatura global provoca un incremento del 7% de la humedad atmosférica. El agua se evapora más, más rápidamente, y los fenómenos climáticos violentos se intensifican. Algunas regiones se secan y otras se inundan. '
