  L’empreinte eau, <2>calculée en milliers de litres par jour</2>, tient compte de <5>l’eau nécessaire</5> à la production, la distribution et au traitement des biens et services consommés. Ce calcul prend également en considération<7>le stress hydrique</7>et pondère les consommations d’eau en fonction de <10>la rareté de la ressource</10> dans les territoires concernés. Ainsi, un litre d’eau utilisé en France n’aura pas la même valeur qu’un litre d’eau utilisé au Maroc.: La huella hídrica, <2>calculada en miles de litros diarios</2>, tiene en cuenta el <5>agua necesaria</5> para producir, distribuir y procesar los bienes y servicios consumidos. El cálculo también tiene en cuenta<7>el estrés hídrico y</7>pondera el consumo de agua en función de <10>la escasez de recursos hídricos</10> en las regiones afectadas. Por ejemplo, un litro de agua utilizado en Francia no tendrá el mismo valor que un litro de agua utilizado en Marruecos.
