  '<0>énergie et production industrielle</0> : la combustion d’énergies fossiles (charbon, pétrole, gaz naturel) pour produire de l’électricité mais aussi pour alimenter les industries est la première cause d’émissions de CO₂ dans le monde ;': '<0>energía y producción industrial</0>: la combustión de combustibles fósiles (carbón, petróleo, gas natural) para producir electricidad y alimentar la industria es la principal causa de emisiones de CO₂ en todo el mundo;'
  En quantifiant l’ensemble de ces émissions, l’empreinte carbone permet de mesurer l’impact sur le climat et de mettre en place des stratégies pour réduire ces émissions.: Al cuantificar todas estas emisiones, la huella de carbono permite medir el impacto sobre el clima y aplicar estrategias para reducirlas.
  La France représente environ 1% des émissions globales mais une partie majeure de son impact est indirecte et liée aux importations de produits fabriqués massivement à l’étranger.: Francia representa alrededor del 1% de las emisiones mundiales, pero una gran parte de su impacto es indirecto y está vinculado a las importaciones de productos fabricados a gran escala en el extranjero.
  Le carbone est un élément chimique nécessaire à la vie sur Terre. Il se trouve dans les végétaux, dans le sol, dans les océans et dans l’atmosphère principalement sous forme de dioxyde de carbone (CO2e).: El carbono es un elemento químico necesario para la vida en la Tierra. Se encuentra en las plantas, en el suelo, en los océanos y en la atmósfera, principalmente en forma de dióxido de carbono (CO2e).
  '<0>production de biens et consommation croissante</0> : la fabrication de biens (électronique, vêtements, équipements, loisirs) à travers le monde génère des émissions à chaque étape : extraction des matières premières, production, transport, distribution et élimination. Ces processus contribuent fortement à l’empreinte carbone globale en raison d’une demande toujours croissante.': '<0>producción de bienes y consumo creciente</0>: la fabricación de bienes (electrónica, ropa, equipamiento, ocio) en todo el mundo genera emisiones en cada una de sus fases: extracción de materias primas, producción, transporte, distribución y eliminación. Estos procesos contribuyen de forma significativa a la huella de carbono mundial debido a una demanda cada vez mayor.'
  'Depuis le siècle dernier, <2>la concentration du carbone dans l’atmosphère augmente</2>, si bien que le climat subit de graves bouleversements : montée des eaux, destruction du vivant, augmentation des températures, etc.': 'Desde el siglo pasado, <2>la concentración de carbono en la atmósfera no ha dejado de aumentar</2>, provocando graves trastornos en el clima: subida del nivel del mar, destrucción de organismos vivos, aumento de las temperaturas, etc.'
  'Il est urgent de réduire nos émissions de gaz à effet de serre et d’opérer une transition vers des modes de vie bas-carbone. Individus et organisations, il est temps d’agir : <2>mesurer son empreinte carbone est la première étape !</2>': 'Necesitamos urgentemente reducir nuestras emisiones de gases de efecto invernadero y hacer la transición a un estilo de vida bajo en carbono. Individuos y organizaciones, es hora de actuar: <2>¡medir la huella de carbono es el primer paso!</2>'
  Réduire efficacement son empreinte sur l’environnement nécessite de <2>s’informer sur les enjeux du réchauffement climatique</2>, s'inspirer des bonnes pratiques et <5>passer à l’action</5>.: Para reducir eficazmente su huella ambiental, debe <2>estar informado sobre los retos del calentamiento global</2>, inspirarse en las buenas prácticas y pasar a <5>la acción</5>.
  L’empreinte carbone de la France s’élève 623 millions de tonnes équivalent CO2e par an, selon <2>les données du Ministère de la Transition Écologique</2>.: La huella de carbono de Francia asciende a 623 millones de toneladas de CO2e al año, según <2>cifras del Ministerio francés de Transición Ecológica</2>.
  Le simulateur en ligne Nos Gestes Climat permet d’estimer votre empreinte écologique, la fois votre empreinte carbone et <2>votre empreinte eau</2> en moins de 10 minutes.: El simulador en línea Nos Gestes Climat te permite calcular tu huella ecológica, tanto la de carbono como <2>la de agua</2>, en menos de 10 minutos.
  'Calculer son empreinte carbone consiste à additionner l’ensemble des gaz à effet de serre émis par ses activités quotidiennes, en tenant compte de plusieurs facteurs comme les déplacements, l’alimentation, le logement et la consommation de biens et services. ': 'Calcular nuestra huella de carbono implica sumar todos los gases de efecto invernadero emitidos por nuestras actividades diarias, teniendo en cuenta una serie de factores como los viajes, la alimentación, la vivienda y el consumo de bienes y servicios. '
  L’empreinte carbone désigne la quantité totale de gaz à effet de serre (GES) émis directement et indirectement par une personne par ses activités sur une année.: La huella de carbono se refiere a la cantidad total de gases de efecto invernadero (GEI) emitidos directa e indirectamente por las actividades de una persona a lo largo de un año.
  "L'empreinte carbone moyenne d'un français est de <2>9 tonnes de CO2e par an</2>. Objectif 2050 : 2 tonnes !": La huella de carbono de un francés medio es de <2>9 toneladas de CO2e al año</2>. El objetivo para 2050 es de 2 toneladas
  L’empreinte carbone englobe les émissions directes et indirectes d’un individu sur une année. Le bilan carbone, en revanche, est un outil de comptabilité utilisé par les organisations (entreprises, collectivités) pour quantifier leurs émissions sur une période donnée et établir un plan de réduction.: La huella de carbono recoge las emisiones directas e indirectas de un individuo a lo largo de un año. Por otro lado, la huella de carbono es una herramienta contable utilizada por las organizaciones (empresas, autoridades locales) para cuantificar sus emisiones durante un periodo determinado y elaborar un plan de reducción.
  '<0>agriculture et élevage</0> : les pratiques agricoles intensives et l’élevage, en particulier la production de viande et les rejets de méthane des ruminants, contribuent fortement aux gaz à effet de serre, avec un impact significatif sur le changement climatique. L’usage de fertilisants et la déforestation pour l’extension des terres agricoles contribuent également à ces émissions ;': '<0>agricultura y ganadería</0>: las prácticas agrícolas intensivas y la ganadería, en particular la producción de carne y las emisiones de metano de los rumiantes, contribuyen en gran medida a las emisiones de gases de efecto invernadero, con un impacto significativo en el cambio climático. El uso de fertilizantes y la deforestación para ampliar las tierras de cultivo también contribuyen a estas emisiones;'
  La Chine et les États-Unis sont les deux plus grands émetteurs de gaz à effet de serre en raison de leur forte dépendance aux énergies fossiles (charbon, pétrole, gaz), de leurs industries énergivores ainsi que de la croissance rapide de leurs secteurs de transport et de production manufacturière.: China y Estados Unidos son los dos mayores emisores de gases de efecto invernadero, debido a su gran dependencia de los combustibles fósiles (carbón, petróleo y gas), sus industrias de alto consumo energético y el rápido crecimiento de sus sectores del transporte y la fabricación.
